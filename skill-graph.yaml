# Skill Dependency Graph
# Machine-readable graph of how pm-playbooks skills feed into each other.
# Used by CLAUDE.md to suggest skill chaining after a run completes.
#
# Fields:
#   category:   strategic | planning | execution | agent-first | analysis
#   feeds_into: skills that logically follow this one
